name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggers

jobs:
  # Pre-commit hooks job
  pre-commit:
    name: Run Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv (fast pip replacement)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv pip install --system pre-commit
          uv pip install --system pytest  # For the custom test hook

      - name: Run pre-commit hooks on all files
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run pre-commit on changed files
        if: github.event_name == 'pull_request'
        run: pre-commit run --from-ref origin/${{ github.base_ref }} --to-ref HEAD

  # Ruff specific job (Python linting)
  ruff-check:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Ruff linter
        uses: astral-sh/ruff-action@v1
        with:
          args: check --exit-non-zero-on-fix

      - name: Run Ruff formatter
        uses: astral-sh/ruff-action@v1
        with:
          args: format --check

  # Gitleaks secret detection
#  gitleaks:
#    name: Secret Detection
#    runs-on: ubuntu-latest
#    steps:
#      - uses: actions/checkout@v4
#        with:
#          fetch-depth: 0
#
#      - name: Run Gitleaks
#        uses: gitleaks/gitleaks-action@v2
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#        with:
#          args: --verbose --redact

  # ShellCheck
  shellcheck:
    name: Shell Script Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning

  # ESLint for JavaScript/TypeScript
#  eslint:
#    name: ESLint Check
