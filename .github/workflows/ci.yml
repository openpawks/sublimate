#          npm install eslint-config-airbnb-base@15.0.0 eslint-plugin-import@2.29.1
#
#      - name: Run ESLint
#        run: |
#          eslint . --ext .js,.jsx,.ts,.tsx --fix || true
#          eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=0
#        continue-on-error: false

  # Python Tests
  pytest:
    name: Run Python Tests
    runs-on: ubuntu-latest
    needs: [pre-commit, ruff-check]  # Only run if pre-commit passes
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv pip install --system pytest

      - name: Run tests
        run: uv run pytest -v

  # Security scanning (optional but recommended)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

